<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HypeWare | Detail Produk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { 
          extend: { 
            colors: { primary: "#EE0000" }, 
            borderRadius: { DEFAULT: "0px" } 
          } 
        },
      };
    </script>
  </head>
  <body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    
    <!-- Navigation -->
    <nav class="border-b border-gray-200 dark:border-gray-800 sticky top-0 bg-white/90 dark:bg-black/90 backdrop-blur-md z-50">
      <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="bg-primary text-white font-bold p-2 text-sm">HW</a>
        <div class="hidden md:flex gap-8 font-bold text-sm tracking-widest uppercase">
          <a href="colection_wanita.html" class="hover:text-primary">Wanita</a>
          <a href="colection_pria.html" class="hover:text-primary">Pria</a>
          <a href="colection_anak.html" class="hover:text-primary">Anak</a>
        </div>
        <div class="flex items-center gap-4">
          <a href="keranjang.html" class="relative">
            <span class="material-icons-outlined hover:text-primary">shopping_bag</span>
            <span class="cart-badge absolute -top-2 -right-2 bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
      
      <!-- Breadcrumb -->
      <nav class="flex text-xs text-gray-500 mb-8 gap-2 uppercase">
        <a href="index.html" class="hover:text-primary">HypeWare</a> 
        <span>/</span>
        <span class="product-category">KATEGORI</span> 
        <span>/</span>
        <span class="product-name text-black dark:text-white font-medium">NAMA PRODUK</span>
      </nav>

      <!-- Product Detail -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        
        <!-- Product Images -->
        <div class="lg:col-span-7">
          <div class="aspect-square bg-gray-100 dark:bg-gray-800 rounded-lg overflow-hidden mb-4">
            <img class="product-image w-full h-full object-cover" src="" alt="Product Image" />
          </div>
          
          <!-- Thumbnail images (if available) -->
          <div class="grid grid-cols-4 gap-2">
            <div class="aspect-square bg-gray-100 dark:bg-gray-800 rounded cursor-pointer">
              <img class="product-image w-full h-full object-cover" src="" alt="Thumbnail 1" />
            </div>
          </div>
        </div>

        <!-- Product Info -->
        <div class="lg:col-span-5">
          <div class="sticky top-24">
            <span class="product-category text-xs font-bold text-gray-500 uppercase">KATEGORI</span>
            <h1 class="product-name text-3xl font-bold mt-1">Memuat Nama...</h1>
            <p class="product-price text-2xl font-bold mt-4 text-primary">Rp0</p>

            <!-- Product Options -->
            <div class="mt-8 space-y-6">
              
              <!-- Size Selection -->
              <div>
                <h3 class="font-bold text-sm mb-3">UKURAN</h3>
                <div class="flex gap-2">
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition" data-size="XS">XS</button>
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition" data-size="S">S</button>
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition selected" data-size="M">M</button>
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition" data-size="L">L</button>
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition" data-size="XL">XL</button>
                  <button class="size-option px-4 py-2 border border-gray-300 dark:border-gray-600 hover:border-primary hover:text-primary transition" data-size="XXL">XXL</button>
                </div>
              </div>

              <!-- Color Selection -->
              <div>
                <h3 class="font-bold text-sm mb-3">WARNA</h3>
                <div class="flex gap-2">
                  <button class="color-option w-8 h-8 rounded-full border-2 border-gray-300 selected" style="background-color: #000000" data-color="Hitam" title="Hitam"></button>
                  <button class="color-option w-8 h-8 rounded-full border-2 border-gray-300" style="background-color: #ffffff" data-color="Putih" title="Putih"></button>
                  <button class="color-option w-8 h-8 rounded-full border-2 border-gray-300" style="background-color: #EE0000" data-color="Merah" title="Merah"></button>
                  <button class="color-option w-8 h-8 rounded-full border-2 border-gray-300" style="background-color: #0066CC" data-color="Biru" title="Biru"></button>
                </div>
              </div>

              <!-- Quantity -->
              <div>
                <h3 class="font-bold text-sm mb-3">JUMLAH</h3>
                <div class="flex items-center gap-3">
                  <button id="qty-minus" class="w-10 h-10 border border-gray-300 dark:border-gray-600 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800">
                    <span class="material-icons-outlined">remove</span>
                  </button>
                  <input type="number" id="quantity" value="1" min="1" max="10" class="quantity-input w-16 text-center border border-gray-300 dark:border-gray-600 py-2 bg-white dark:bg-gray-800">
                  <button id="qty-plus" class="w-10 h-10 border border-gray-300 dark:border-gray-600 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800">
                    <span class="material-icons-outlined">add</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-8 space-y-4">
              <button class="add-to-cart-btn w-full bg-primary text-white py-4 font-bold uppercase tracking-wider hover:bg-red-600 transition">
                Tambah ke Keranjang
              </button>
              <button id="buy-now-btn" class="w-full border border-primary text-primary py-4 font-bold uppercase tracking-wider hover:bg-primary hover:text-white transition">
                Beli Sekarang
              </button>
            </div>

            <!-- Product Description -->
            <div class="mt-8 border-t border-gray-200 dark:border-gray-700 pt-6">
              <h3 class="font-bold text-sm mb-3">DESKRIPSI</h3>
              <div class="product-description text-sm text-gray-600 dark:text-gray-400 leading-relaxed">
                <p>Deskripsi produk akan dimuat di sini...</p>
              </div>
            </div>

            <!-- Product Details -->
            <div class="mt-6">
              <h3 class="font-bold text-sm mb-3">DETAIL PRODUK</h3>
              <div class="text-sm text-gray-600 dark:text-gray-400 space-y-1">
                <div class="flex justify-between">
                  <span>Kategori:</span>
                  <span class="product-category-detail">-</span>
                </div>
                <div class="flex justify-between">
                  <span>Gender:</span>
                  <span class="product-gender">-</span>
                </div>
                <div class="flex justify-between">
                  <span>Material:</span>
                  <span>100% Cotton</span>
                </div>
                <div class="flex justify-between">
                  <span>Perawatan:</span>
                  <span>Machine Wash</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="produk.js"></script>
    <script src="footer.js"></script>
    
    <script>
        let selectedSize = 'M';
        let selectedColor = 'Hitam';

        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, setting up product detail page...');
            
            // Tunggu sebentar untuk memastikan produk.js sudah load
            setTimeout(() => {
                setupProductDetailPage();
                setupEventListeners();
            }, 100);
        });

        function setupProductDetailPage() {
            console.log('Setting up product detail page...');
            console.log('hypewareProducts available:', !!window.hypewareProducts);
            
            // Coba beberapa cara untuk load product detail
            if (window.hypewareProducts && window.hypewareProducts.loadProductDetail) {
                console.log('Calling hypewareProducts.loadProductDetail...');
                window.hypewareProducts.loadProductDetail();
            } else if (typeof loadProductDetail === 'function') {
                console.log('Calling global loadProductDetail...');
                loadProductDetail();
            } else {
                console.log('No loadProductDetail function found, trying manual load...');
                // Manual fallback
                manualLoadProduct();
            }
        }
        
        function manualLoadProduct() {
            // Coba ambil dari localStorage dulu (sistem baru)
            let productId = localStorage.getItem('selectedProductId');
            
            // Jika tidak ada, coba ambil dari URL parameter (sistem lama)
            if (!productId) {
                const urlParams = new URLSearchParams(window.location.search);
                productId = urlParams.get('id');
            }
            
            console.log('Manual loading product ID:', productId);
            
            if (!productId) {
                console.log('No product ID found');
                return;
            }
            
            // Tunggu sampai hypewareProducts tersedia
            const checkProducts = () => {
                if (window.hypewareProducts && window.hypewareProducts.getProductById) {
                    const product = window.hypewareProducts.getProductById(productId);
                    console.log('Found product manually:', product);
                    
                    if (product && window.updateProductDetailPage) {
                        window.updateProductDetailPage(product);
                    }
                } else {
                    console.log('hypewareProducts not ready, retrying...');
                    setTimeout(checkProducts, 100);
                }
            };
            
            checkProducts();
        }

        function setupEventListeners() {
            // Size selection
            document.querySelectorAll('.size-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.size-option').forEach(b => b.classList.remove('selected', 'border-primary', 'text-primary'));
                    this.classList.add('selected', 'border-primary', 'text-primary');
                    selectedSize = this.dataset.size;
                });
            });

            // Color selection
            document.querySelectorAll('.color-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected', 'border-primary'));
                    this.classList.add('selected', 'border-primary');
                    selectedColor = this.dataset.color;
                });
            });

            // Quantity controls
            document.getElementById('qty-minus').addEventListener('click', function() {
                const qtyInput = document.getElementById('quantity');
                const currentQty = parseInt(qtyInput.value);
                if (currentQty > 1) {
                    qtyInput.value = currentQty - 1;
                }
            });

            document.getElementById('qty-plus').addEventListener('click', function() {
                const qtyInput = document.getElementById('quantity');
                const currentQty = parseInt(qtyInput.value);
                if (currentQty < 10) {
                    qtyInput.value = currentQty + 1;
                }
            });

            // Buy now button
            document.getElementById('buy-now-btn').addEventListener('click', function() {
                const productId = localStorage.getItem('selectedProductId');
                const quantity = parseInt(document.getElementById('quantity').value);
                
                if (window.hypewareProducts && window.hypewareProducts.cart) {
                    const success = window.hypewareProducts.cart.addItem(productId, quantity, selectedSize, selectedColor);
                    if (success) {
                        // Redirect to cart
                        window.location.href = 'keranjang.html';
                    }
                }
            });
        }

        // Override function dari produk.js untuk update halaman
        window.updateProductDetailPage = function(product) {
            console.log('Window override called with:', product);
            
            // Update title
            document.title = `${product.nama} - Hypeware`;
            
            // Update breadcrumb
            document.querySelectorAll('.product-category').forEach(el => {
                el.textContent = product.gender.toUpperCase();
            });
            document.querySelectorAll('.product-name').forEach(el => {
                el.textContent = product.nama;
            });

            // Update product image
            document.querySelectorAll('.product-image').forEach(img => {
                img.src = product.img;
                img.alt = product.nama;
            });

            // Update product info
            document.querySelector('.product-price').textContent = product.harga;
            document.querySelector('.product-category-detail').textContent = getCategoryName(product.category);
            document.querySelector('.product-gender').textContent = product.gender.charAt(0).toUpperCase() + product.gender.slice(1);

            // Update description (jika ada)
            const description = getProductDescription(product);
            document.querySelector('.product-description').innerHTML = `<p>${description}</p>`;

            // Setup add to cart button
            const addToCartBtn = document.querySelector('.add-to-cart-btn');
            if (addToCartBtn) {
                addToCartBtn.onclick = () => {
                    const quantity = parseInt(document.getElementById('quantity').value);
                    if (window.hypewareProducts && window.hypewareProducts.cart) {
                        const success = window.hypewareProducts.cart.addItem(product.id, quantity, selectedSize, selectedColor);
                        if (success) {
                            window.hypewareProducts.showNotification(`${quantity} item ditambahkan ke keranjang!`, 'success');
                        }
                    }
                };
            }
        };

        function getCategoryName(category) {
            const categoryNames = {
                'bjp': 'Kaos',
                'km': 'Kemeja',
                'op': 'Outerwear',
                'dr': 'Dress',
                'ro': 'Rok',
                'cl': 'Celana',
                'bj': 'Baju'
            };
            return categoryNames[category] || category;
        }

        function getProductDescription(product) {
            // Gunakan deskripsi dari data produk jika ada
            if (product.deskripsi) {
                return product.deskripsi;
            }
            
            // Fallback ke deskripsi default berdasarkan kategori
            const descriptions = {
                'bjp': 'Kaos berkualitas tinggi dengan bahan katun yang nyaman dan breathable. Cocok untuk aktivitas sehari-hari.',
                'km': 'Kemeja dengan desain modern dan bahan premium. Sempurna untuk tampilan kasual maupun formal.',
                'op': 'Outerwear stylish yang memberikan perlindungan dan kenyamanan. Ideal untuk berbagai cuaca.',
                'dr': 'Dress elegan dengan potongan yang flattering. Dibuat dari bahan berkualitas untuk kenyamanan maksimal.',
                'ro': 'Rok dengan desain feminin dan bahan yang nyaman. Cocok untuk berbagai kesempatan.',
                'cl': 'Celana dengan fit yang sempurna dan bahan yang tahan lama. Memberikan kenyamanan sepanjang hari.',
                'bj': 'Baju dengan desain trendy dan bahan berkualitas. Sempurna untuk gaya kasual yang stylish.'
            };
            
            return descriptions[product.category] || 'Produk berkualitas tinggi dari Hypeware dengan desain modern dan bahan premium.';
        }
    </script>
  </body>
</html>
