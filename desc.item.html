<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HypeWare | Detail Produk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { colors: { primary: "#EE0000" }, borderRadius: { DEFAULT: "0px" } } },
      };
    </script>
  </head>
  <body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    
    <nav class="border-b border-gray-200 dark:border-gray-800 sticky top-0 bg-white/90 dark:bg-black/90 backdrop-blur-md z-50">
      <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="bg-primary text-white font-bold p-2 text-sm">HW</a>
        <div class="hidden md:flex gap-8 font-bold text-sm tracking-widest uppercase">
          <a href="colection.html">Wanita</a>
          <a href="colection.html">Pria</a>
          <a href="colection.html">Anak</a>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <nav class="flex text-xs text-gray-500 mb-8 gap-2 uppercase">
        <a href="index.html">HypeWare</a> <span>/</span>
        <span id="breadcrumb-cat">KATEGORI</span> <span>/</span>
        <span id="breadcrumb-name" class="text-black dark:text-white font-medium">NAMA PRODUK</span>
      </nav>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-7">
          <div class="grid grid-cols-2 gap-2">
            <img id="main-img-1" class="w-full aspect-[3/4] object-cover bg-gray-100" src="" alt="View 1" />
            <img id="main-img-2" class="w-full aspect-[3/4] object-cover bg-gray-100" src="" alt="View 2" />
          </div>
        </div>

        <div class="lg:col-span-5">
          <span id="p-brand" class="text-xs font-bold text-gray-500 uppercase">BRAND</span>
          <h1 id="p-name" class="text-3xl font-bold mt-1">Memuat Nama...</h1>
          <p id="p-price" class="text-2xl font-bold mt-4 text-primary">Rp0</p>

          <div class="mt-8 border-t border-gray-200 pt-6">
             <h3 class="font-bold text-sm mb-2">DESKRIPSI</h3>
             <p id="p-desc" class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">...</p>
          </div>

          <button class="w-full bg-black dark:bg-white text-white dark:text-black font-bold h-14 mt-10 hover:opacity-90">
            TAMBAHKAN KE KERANJANG
          </button>
        </div>
      </div>
    </main>

    <script src="produk.js"></script>
    <script>
      function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'kerah-bulat'; // Default ID
        const p = dataProduk[id];

        if (p) {
          document.getElementById('p-name').innerText = p.nama;
          document.getElementById('breadcrumb-name').innerText = p.nama;
          document.getElementById('p-brand').innerText = p.brand;
          document.getElementById('p-price').innerText = p.harga;
          document.getElementById('p-desc').innerText = p.deskripsi;
          document.getElementById('breadcrumb-cat').innerText = p.kategori;
          document.getElementById('main-img-1').src = p.gambar[0];
          document.getElementById('main-img-2').src = p.gambar[1];
        }
      }
      window.onload = init;
    </script>
  </body>
</html>
