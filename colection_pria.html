<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Koleksi Pria | Fashion Minimalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ff0000",
              "background-light": "#ffffff",
              "background-dark": "#121212",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .product-card:hover .quick-add {
        opacity: 1;
        transform: translateY(0);
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div class="bg-stone-100 dark:bg-stone-900 py-2 text-center text-xs tracking-wider">
      <p>Gratis Ongkir dengan min. pembelian Rp699.000</p>
    </div>

    <nav class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-stone-200 dark:border-stone-800">
      <div class="max-w-7xl mx-auto px-4 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-8">
            <a href="index.html" class="bg-primary text-white p-1 font-bold text-xl leading-none tracking-tighter flex flex-col items-center w-8 h-8 justify-center">
              <span class="text-[14px]">HW</span>
            </a>
            <div class="hidden md:flex space-x-8 font-medium text-sm">
              <a class="text-stone-500 hover:text-black dark:hover:text-white transition-colors" href="colection_wanita.html">WANITA</a>
              <a class="border-b-2 border-primary pb-5 -mb-5" href="colection_pria.html">PRIA</a>
              <a class="text-stone-500 hover:text-black dark:hover:text-white transition-colors" href="colection_anak.html">ANAK</a>
            </div>
          </div>
          <div class="flex items-center space-x-6">
            <a href="search fitur.html" class="p-1 hover:opacity-70">
              <span class="material-icons-outlined text-xl">search</span>
            </a>
            <a href="#" class="p-1 hover:opacity-70">
              <span class="material-icons-outlined text-xl">favorite_border</span>
            </a>
            <a href="customer profile.html" class="p-1 hover:opacity-70">
              <span class="material-icons-outlined text-xl">person_outline</span>
            </a>
            <a href="keranjang.html" class="p-1 hover:opacity-70 relative inline-block">
              <span class="material-icons-outlined text-xl">shopping_cart</span>
              <span class="cart-badge absolute -top-1 -right-1 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </a>
            <button class="p-1 md:hidden">
              <span class="material-icons-outlined text-xl">menu</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
      <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6 border-b border-gray-100 dark:border-gray-800 pb-6">
        <div class="flex flex-wrap gap-6">
          <button onclick="filterAction('all')" class="filter-btn active border-b-2 border-black font-bold text-xs uppercase tracking-widest pb-1">Semua</button>
          <button onclick="filterAction('bjp')" class="filter-btn text-gray-400 font-bold text-xs uppercase tracking-widest pb-1 hover:text-black transition">Kaos</button>
          <button onclick="filterAction('km')" class="filter-btn text-gray-400 font-bold text-xs uppercase tracking-widest pb-1 hover:text-black transition">Kemeja</button>
          <button onclick="filterAction('cl')" class="filter-btn text-gray-400 font-bold text-xs uppercase tracking-widest pb-1 hover:text-black transition">Celana</button>
          <button onclick="filterAction('op')" class="filter-btn text-gray-400 font-bold text-xs uppercase tracking-widest pb-1 hover:text-black transition">Outerwear</button>
        </div>

        <select id="sortOption" onchange="runFilterAndSort()" class="bg-transparent border-none text-xs font-bold uppercase tracking-widest focus:ring-0 cursor-pointer">
          <option value="newest">Urutkan: Terbaru</option>
          <option value="low">Harga: Terendah</option>
          <option value="high">Harga: Tertinggi</option>
        </select>
      </div>

      <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6"></div>
      
      <!-- Load More Button -->
      <div id="load-more-container" class="mt-16 flex justify-center hidden">
        <button id="load-more-btn" onclick="loadMoreAction()" class="border border-black px-10 py-4 text-[11px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all duration-300">
          Tampilkan Lebih Banyak
        </button>
      </div>

      <!-- No More Products Message -->
      <div id="no-more-products" class="mt-8 text-center text-gray-500 hidden">
        <p class="text-sm">Semua produk telah ditampilkan</p>
      </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="produk.js"></script>
    <script src="footer.js"></script>
    
    <script>
      // Collection page variables
      let activeFilter = 'all';
      let itemsLimit = 8; // Batas awal item yang tampil
      let filteredData = []; // Menyimpan data yang sudah difilter
      let allProducts = []; // Menyimpan semua produk

      document.addEventListener('DOMContentLoaded', function() {
        console.log('Collection page loaded');
        // Tunggu sebentar untuk memastikan produk.js sudah load
        setTimeout(() => {
          initializeCollectionPage();
        }, 100);
      });

      function initializeCollectionPage() {
        console.log('Initializing collection page...');
        
        if (!window.hypewareProducts || !window.hypewareProducts.getProductsByGender) {
          console.log('Product system not ready, retrying...');
          setTimeout(initializeCollectionPage, 100);
          return;
        }

        // Ambil data produk pria
        allProducts = window.hypewareProducts.getProductsByGender('pria');
        console.log('Loaded products:', allProducts);
        
        // Cek URL parameter untuk kategori
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('cat');
        
        if (categoryParam) {
          console.log('URL category parameter:', categoryParam);
          activeFilter = categoryParam;
          
          // Update button states berdasarkan URL parameter
          document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active', 'border-b-2', 'border-black', 'text-black');
            btn.classList.add('text-gray-400');
          });
          
          // Cari dan aktifkan button yang sesuai
          const targetButton = document.querySelector(`[onclick="filterAction('${categoryParam}')"]`);
          if (targetButton) {
            targetButton.classList.add('active', 'border-b-2', 'border-black', 'text-black');
            targetButton.classList.remove('text-gray-400');
          }
        }
        
        // Jalankan filter dan sort pertama kali
        runFilterAndSort();
        
        // Update cart badge
        if (window.hypewareProducts.cart) {
          window.hypewareProducts.cart.updateCartUI();
        }
      }

      function renderItems(list) {
        const container = document.getElementById('product-container');
        const loadMoreContainer = document.getElementById('load-more-container');
        const noMoreProducts = document.getElementById('no-more-products');
        
        console.log('Rendering items:', list.length, 'items, limit:', itemsLimit);
        
        if (!list || list.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400 uppercase tracking-widest">Produk tidak tersedia.</p>`;
          loadMoreContainer.classList.add('hidden');
          noMoreProducts.classList.add('hidden');
          return;
        }

        // POTONG DATA: Hanya ambil data dari indeks 0 sampai itemsLimit
        const visibleItems = list.slice(0, itemsLimit);
        console.log('Visible items:', visibleItems.length);

        container.innerHTML = visibleItems.map(item => `
          <div class="group animate-on-scroll cursor-pointer" onclick="viewProduct('${item.id}')">
            <div class="relative aspect-[3/4] overflow-hidden bg-gray-100 mb-4">
              <img src="${item.img}" alt="${item.nama}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" loading="lazy" />
              <button onclick="event.stopPropagation(); addToCartQuick('${item.id}')" 
                      class="absolute bottom-4 right-4 bg-white/90 dark:bg-black/90 p-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="material-icons-outlined text-xl">shopping_cart</span>
              </button>
            </div>
            <div>
              <p class="text-[11px] text-slate-500 mb-1 uppercase tracking-tighter">${item.gender} | ${getCategoryName(item.category)}</p>
              <h3 class="text-sm font-medium mb-2 group-hover:text-primary transition-colors">${item.nama}</h3>
              <p class="font-bold">${item.harga}</p>
            </div>
          </div>
        `).join('');

        // LOGIKA TOMBOL: Tampilkan tombol hanya jika total barang > barang yang tampil
        if (list.length > itemsLimit) {
          loadMoreContainer.classList.remove('hidden');
          noMoreProducts.classList.add('hidden');
        } else {
          loadMoreContainer.classList.add('hidden');
          if (list.length > 8) { // Hanya tampilkan pesan jika ada lebih dari 8 produk
            noMoreProducts.classList.remove('hidden');
          } else {
            noMoreProducts.classList.add('hidden');
          }
        }

        // Animate new items
        setTimeout(() => {
          setupScrollAnimation();
        }, 100);
      }

      function loadMoreAction() {
        console.log('Load more clicked, current limit:', itemsLimit);
        itemsLimit += 8; // Tambah 8 item lagi setiap diklik
        renderItems(filteredData);
      }

      function filterAction(cat) {
        console.log('Filter action:', cat);
        activeFilter = cat;
        itemsLimit = 8; // Reset limit setiap ganti kategori
        
        // Update button states
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.remove('active', 'border-b-2', 'border-black', 'text-black');
          btn.classList.add('text-gray-400');
        });
        event.target.classList.add('active', 'border-b-2', 'border-black', 'text-black');
        event.target.classList.remove('text-gray-400');

        runFilterAndSort();
      }

      function runFilterAndSort() {
        console.log('Running filter and sort, activeFilter:', activeFilter);
        
        if (!allProducts || allProducts.length === 0) {
          console.log('No products available');
          return;
        }

        // 1. Ambil data asli dan filter
        filteredData = activeFilter === 'all' 
          ? [...allProducts] 
          : allProducts.filter(p => p.category === activeFilter);

        console.log('Filtered data:', filteredData.length, 'items');

        // 2. Sort berdasarkan harga
        const sortType = document.getElementById('sortOption').value;
        if (sortType === 'low') {
          filteredData.sort((a, b) => a.priceNumeric - b.priceNumeric);
        } else if (sortType === 'high') {
          filteredData.sort((a, b) => b.priceNumeric - a.priceNumeric);
        }

        // 3. Render
        renderItems(filteredData);
      }

      function viewProduct(productId) {
        console.log('Viewing product:', productId);
        if (window.hypewareProducts && window.hypewareProducts.viewProduct) {
          window.hypewareProducts.viewProduct(productId);
        } else {
          // Fallback
          localStorage.setItem('selectedProductId', productId);
          window.location.href = 'desc.item.html';
        }
      }

      function addToCartQuick(productId) {
        console.log('Adding to cart:', productId);
        if (window.hypewareProducts && window.hypewareProducts.addToCartQuick) {
          window.hypewareProducts.addToCartQuick(productId);
        } else {
          alert('Sistem keranjang belum siap, coba lagi sebentar.');
        }
      }

      function getCategoryName(category) {
        const categoryNames = {
          'bjp': 'Kaos',
          'km': 'Kemeja',
          'op': 'Outerwear',
          'cl': 'Celana'
        };
        return categoryNames[category] || category;
      }

      function setupScrollAnimation() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('opacity-100', 'translate-y-0');
              entry.target.classList.remove('opacity-0', 'translate-y-8');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach((el) => {
          if (!el.classList.contains('opacity-100')) {
            el.classList.add('opacity-0', 'translate-y-8', 'transition-all', 'duration-700', 'ease-out');
            observer.observe(el);
          }
        });
      }
    </script>
  </body>
</html>
